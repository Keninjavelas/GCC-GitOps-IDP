steps:
# 1. Build the Docker Image
- name: 'gcr.io/cloud-builders/docker'
  dir: 'app-source' 
  args: ['build', '-t', 'us-central1-docker.pkg.dev/influential-sky-488915-u9/my-repo/my-app:$COMMIT_SHA', '.']

# 2. Push the Docker Image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/influential-sky-488915-u9/my-repo/my-app:$COMMIT_SHA']

# 3. Update the GitOps Manifest using the Secret
- name: 'gcr.io/cloud-builders/git'
  entrypoint: 'bash'
  secretEnv: ['GITHUB_TOKEN'] # <--- Tells the step to load the secret
  args:
  - '-c'
  - |
    set -e 
    
    echo "=== Configuring Git ==="
    git config --global user.email "cloudbuild@gserviceaccount.com"
    git config --global user.name "Cloud Build Automated IDP"
    
    # Inject the secure token into the GitHub URL
    git remote set-url origin https://Keninjavelas:$$GITHUB_TOKEN@github.com/Keninjavelas/GCC-GitOps-IDP.git
    
    echo "=== Navigating to GitOps Folder ==="
    cd /workspace/gitops-config/base
    
    echo "=== Updating Image Tag ==="
    sed -i "s|newTag:.*|newTag: $COMMIT_SHA|g" kustomization.yaml
    git add kustomization.yaml
    
    echo "=== Committing and Pushing ==="
    if git diff-index --quiet HEAD --; then
      echo "No changes detected. Skipping commit."
    else
      git commit -m "Automated update: image tag $COMMIT_SHA"
      echo "Pushing changes back to GitHub branch: $BRANCH_NAME"
      git push origin HEAD:$BRANCH_NAME
    fi

options:
  logging: CLOUD_LOGGING_ONLY

# This section grabs the secret from Google Cloud and assigns it to GITHUB_TOKEN
availableSecrets:
  secretManager:
  - versionName: projects/influential-sky-488915-u9/secrets/github-token/versions/latest
    env: 'GITHUB_TOKEN'